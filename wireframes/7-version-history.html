    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {

                            900: '#1e3a8a',

                            green: '#10B981',
                            orange: '#F59E0B',
                            red: '#EF4444',
                            yellow: '#FBBF24',

                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',

        }

    <style>
        body { margin: 0; padding: 0; background-color: #E2E8F0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .bento-card { background: #FFFFFF; border-radius: 24px; box-shadow: 0 4px 24px -4px rgba(0,0,0,0.05); }
        .dark .bento-card { background: #1E293B; box-shadow: 0 4px 24px -4px rgba(0,0,0,0.2); }
        .bento-inner-card { background: #F8FAFC; border-radius: 16px; padding: 20px; border: 1px solid #E2E8F0; }
        .dark .bento-inner-card { background: #0F172A; border-color: #334155; }
        
        .code-block { font-family: 'JetBrains Mono', monospace; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; padding: 16px; font-size: 14px; overflow-x: auto; }
        .dark .code-block { background: #0F172A; border-color: #334155; color: #E2E8F0; }
        
        .diff-add { background-color: rgba(16, 185, 129, 0.1); color: #059669; }
        .dark .diff-add { background-color: rgba(16, 185, 129, 0.2); color: #34D399; }
        .diff-remove { background-color: rgba(239, 68, 68, 0.1); color: #DC2626; text-decoration: line-through; }
        .dark .diff-remove { background-color: rgba(239, 68, 68, 0.2); color: #F87171; }
    </style>
</head>
<body class="text-surface-800 dark:text-surface-200 antialiased h-screen overflow-hidden flex bg-[#E2E8F0] dark:bg-surface-900 transition-colors duration-200 m-0 p-0">

        <div class="p-6 flex items-center justify-between border-b border-surface-100 dark:border-surface-700">

            </div>
        </div>

                <nav class="space-y-1">

                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-xl text-surface-600 dark:text-surface-400 hover:bg-surface-50 dark:hover:bg-surface-700/50 transition-colors">

                    </a>
                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-xl bg-brand-50 dark:bg-brand-900/20 text-brand-600 dark:text-brand-400 font-medium">
                        <i class="fa-solid fa-clock-rotate-left w-5 text-center"></i>
                        <span class="text-sm font-medium">Version History</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-xl text-surface-600 dark:text-surface-400 hover:bg-surface-50 dark:hover:bg-surface-700/50 transition-colors">
                        <i class="fa-solid fa-file-zipper w-5 text-center"></i>
                        <span class="text-sm font-medium">Backup & Restore</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-xl text-surface-600 dark:text-surface-400 hover:bg-surface-50 dark:hover:bg-surface-700/50 transition-colors">
                        <i class="fa-solid fa-shield-halved w-5 text-center"></i>
                        <span class="text-sm font-medium">Settings & Security</span>
                    </a>

                <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-4.jpg" alt="User" class="w-10 h-10 rounded-full border-2 border-white dark:border-surface-800 shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-surface-900 dark:text-white truncate">Alex Morgan</p>
                    <p class="text-xs text-surface-500 truncate">Product Manager</p>
                </div>
                <button class="text-surface-400 hover:text-surface-600 transition-colors">

            <div class="flex items-center gap-4">
                <h1 class="text-lg font-semibold text-surface-900 dark:text-white">Version History: Q3 Sales Dashboard Analysis</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <label class="flex items-center gap-2 text-sm text-surface-600 dark:text
